<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Həkim Modulu</title>
  <style>
    body {
      background: linear-gradient(to bottom, #043927, #0e6655);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px 20px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .message {
      font-size: 22px;
      margin-bottom: 30px;
    }

    .btn {
      background-color: #28b463;
      border: none;
      color: white;
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin: 10px;
    }

    .btn:hover {
      background-color: #1d8348;
    }

    .diagnosis {
      font-size: 18px;
      margin-top: 20px;
      color: #d4efdf;
    }
  </style>
</head>
<body>
  <div class="icon">🩺</div>
  <div class="message">Salam, mən sənin virtual həkiminəm. Necə hiss edirsən özünü?</div>

  <button class="btn" onclick="showAdvice('qizdirma')">Qızdırmam var</button>
  <button class="btn" onclick="showAdvice('basağrısı')">Baş ağrım var</button>
  <button class="btn" onclick="showAdvice('heçnə')">Yaxşıyam</button>

  <div class="diagnosis" id="result"></div>

  <br><br>
  <button class="btn" onclick="goBack()">🔙 Geri</button>

  <script>
    function showAdvice(state) {
      const result = document.getElementById("result");
      if (state === "qizdirma") {
        result.innerText = "İstirahət et və bol maye qəbul et. Əgər davam edərsə, həkimə müraciət et.";
      } else if (state === "basağrısı") {
        result.innerText = "İşıqlı mühitdən uzaqlaş və bir az dincəl. Əgər tez-tez olur, bizə xəbər ver.";
      } else {
        result.innerText = "Əla! Sağlam olmağa davam et!";
      }
    }

    function goBack() {
      window.location.href = 'modules.html';
    }
  </script>
</body>
</html>
