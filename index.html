<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>guid.space – Ağıllı Bələdçi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 10px;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
    }
    select {
      margin-left: 20px;
      padding: 5px;
    }
    main {
      padding: 40px 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a id="nav-home" href="#"></a></li>
        <li><a id="nav-modules" href="#"></a></li>
        <li><a id="nav-about" href="#"></a></li>
        <li><a id="nav-contact" href="#"></a></li>
      </ul>
      <select id="language-switcher" onchange="switchLanguage()">
        <option value="az">AZ</option>
        <option value="en" selected>EN</option>
        <option value="ru">RU</option>
      </select>
    </nav>
  </header>

  <main>
    <h1 id="welcome-title"></h1>
    <p id="welcome-text"></p>
    <button id="start-button"></button>
  </main>

  <script>
    const translations = {
      az: {
        welcomeTitle: "Salam! guid.space-ə xoş gəlmisiniz!",
        welcomeText: "Gələcəyin ağıllı bələdçisinə xoş gəlmisiniz.",
        startButton: "Başla",
        home: "Ana səhifə",
        modules: "Modullar",
        about: "Haqqımızda",
        contact: "Əlaqə"
      },
      en: {
        welcomeTitle: "Hello! Welcome to guid.space!",
        welcomeText: "Welcome to the smart guide of the future.",
        startButton: "Start",
        home: "Home",
        modules: "Modules",
        about: "About Us",
        contact: "Contact"
      },
      ru: {
        welcomeTitle: "Здравствуйте! Добро пожаловать в guid.space!",
        welcomeText: "Добро пожаловать в умный гид будущего.",
        startButton: "Начать",
        home: "Главная",
        modules: "Модули",
        about: "О нас",
        contact: "Контакты"
      }
    };

    function switchLanguage() {
      const lang = document.getElementById('language-switcher').value;
      document.getElementById('welcome-title').textContent = translations[lang].welcomeTitle;
      document.getElementById('welcome-text').textContent = translations[lang].welcomeText;
      document.getElementById('start-button').textContent = translations[lang].startButton;
      document.getElementById('nav-home').textContent = translations[lang].home;
      document.getElementById('nav-modules').textContent = translations[lang].modules;
      document.getElementById('nav-about').textContent = translations[lang].about;
      document.getElementById('nav-contact').textContent = translations[lang].contact;
    }

    window.onload = switchLanguage;
  </script>
</body>
</html>
