<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>guid.space</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to right, #4b6cb7, #182848);
      color: white;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: rgba(0, 0, 0, 0.2);
    }
    .nav-links a {
      color: white;
      margin-left: 1rem;
      text-decoration: none;
    }
    .language-select {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 0.3rem;
      border-radius: 4px;
    }
    .content {
      text-align: center;
      margin-top: 20vh;
    }
    .content h1 {
      font-size: 2em;
    }
    .content button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      background-color: white;
      color: #182848;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-links">
      <a href="#">Ana səhifə</a>
      <a href="#">Haqqımızda</a>
      <a href="#">Modullar</a>
      <a href="#">Əlaqə</a>
    </div>
    <div>
      <select class="language-select">
        <option value="az">AZ</option>
        <option value="en">EN</option>
        <option value="tr">TR</option>
      </select>
    </div>
  </div>

  <div class="content">
    <h1>Salam! guid.space saytıdır!</h1>
    <p>Gələcəyin ağıllı bələdçisinə xoş gəlmisən.</p>
    <button>Başla</button>
  </div>
</body>
</html>
