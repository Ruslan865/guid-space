<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>guid.space</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #3b5998, #1e3c72);
      color: white;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.2);
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    select {
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    .container {
      padding: 60px 20px;
    }

    .button {
      background-color: white;
      color: #1e3c72;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <nav>
        <a href="#">Ana səhifə</a>
        <a href="#">Haqqımızda</a>
        <a href="#">Modullar</a>
        <a href="#">Əlaqə</a>
      </nav>
    </div>
    <div>
      <select id="languageSwitcher">
        <option value="az">AZ</option>
        <option value="en">EN</option>
        <option value="ru">RU</option>
      </select>
    </div>
  </header>

  <div class="container">
    <h1 id="mainTitle">Salam! guid.space saytıdır!</h1>
    <p id="subtitle">Gələcəyin ağıllı bələdçisinə xoş gəlmisən.</p>
    <button class="button" id="startButton">Başla</button>
  </div>

  <script>
    const translations = {
      az: {
        title: "Salam! guid.space saytıdır!",
        subtitle: "Gələcəyin ağıllı bələdçisinə xoş gəlmisən.",
        button: "Başla"
      },
      en: {
        title: "Hello! Welcome to guid.space!",
        subtitle: "Welcome to the smart guide of the future.",
        button: "Start"
      },
      ru: {
        title: "Привет! Это сайт guid.space!",
        subtitle: "Добро пожаловать в умного проводника будущего.",
        button: "Начать"
      }
    };

    const switcher = document.getElementById('languageSwitcher');
    const mainTitle = document.getElementById('mainTitle');
    const subtitle = document.getElementById('subtitle');
    const startButton = document.getElementById('startButton');

    switcher.addEventListener('change', (e) => {
      const lang = e.target.value;
      mainTitle.textContent = translations[lang].title;
      subtitle.textContent = translations[lang].subtitle;
      startButton.textContent = translations[lang].button;
    });
  </script>
</body>
</html>
