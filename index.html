<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>guid.space</title>
  <style>
    body {
      background-color: #1e90ff;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    select {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
    }
    .smiley {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="smiley">😊</div>
  <h1 id="text">Salam! Bu guid.space saytıdır.</h1>
  <select onchange="changeLanguage(this.value)">
    <option value="az">Azərbaycan</option>
    <option value="en">English</option>
    <option value="tr">Türkçe</option>
    <option value="ru">Русский</option>
  </select>

  <script>
    const translations = {
      az: "Salam! Bu guid.space saytıdır.",
      en: "Hello! This is the guid.space website.",
      tr: "Merhaba! Bu guid.space sitesidir.",
      ru: "Привет! Это сайт guid.space."
    };
    function changeLanguage(lang) {
      document.getElementById("text").innerText = translations[lang] || translations.az;
    }
  </script>
</body>
</html>
