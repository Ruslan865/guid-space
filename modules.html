<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <title>Al Eye - Modullar</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 600px;
    }
    .module-btn {
      background-color: #007bff;
      border: none;
      padding: 15px 10px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .module-btn:hover {
      background-color: #005bbb;
    }
    .back-btn {
      margin-top: 40px;
      background-color: #555;
      width: 120px;
    }
    .back-btn:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <h1>Modullar</h1>
  <div class="module-grid">
    <button class="module-btn" onclick="openModule('Dost')">Dost</button>
    <button class="module-btn" onclick="openModule('Müəllim')">Müəllim</button>
    <button class="module-btn" onclick="openModule('Həkim')">Həkim</button>
    <button class="module-btn" onclick="openModule('Dayə')">Dayə</button>
    <button class="module-btn" onclick="openModule('İdmançı')">İdmançı</button>
    <button class="module-btn" onclick="openModule('Psixoloq')">Psixoloq</button>
    <button class="module-btn" onclick="openModule('Uşaq & Ailə')">Uşaq & Ailə</button>
    <button class="module-btn" onclick="openModule('Yaşlılar')">Yaşlılar</button>
    <button class="module-btn" onclick="openModule('Avtomobil')">Avtomobil</button>
  </div>

  <button class="module-btn back-btn" onclick="window.location.href='index.html'">Geri</button>

  <script>
    function openModule(name) {
      alert(name + " modulu aktivdir!");
      // Əgər səhifəyə keçid etmək istəyirsənsə, burada link verə bilərsən.
      // window.location.href = name.toLowerCase() + ".html";
    }
  </script>
</body>
</html>
